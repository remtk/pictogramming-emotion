<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピクトグラミング+感情表現 | Pictogramming Emotion Edition</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <h1>ピクトグラミング<span style="color:var(--accent-joy)">+感情</span></h1>
    <span class="brand-sub">PICTOGRAMMING — EMOTION EDITION</span>
  </div>
  <div class="session-info" style="font-size: 13px; color: var(--ink-soft); font-family: var(--font-mono); display: flex; align-items: center; gap: 8px;">
    <span>ID:</span>
    <span id="display-session-id" style="font-weight: 700; color: var(--ink); background: var(--paper-soft); padding: 2px 8px; border-radius: 4px;"></span>
  </div>
</header>

<main class="app-main">

  <!-- 左パネル: 人型ピクトグラム表示 + 感情パレット -->
  <section class="panel pictogram-panel">
    <h2 class="panel-title"><span class="dot"></span>人型ピクトグラム表示パネル</h2>
    <div class="pictogram-stage" id="pictogram-stage" style="position: relative;">
      <div class="speech-bubble" id="speech-bubble"></div>
      <div class="coord-tooltip" id="coord-tooltip" style="display:none; position:absolute; top:0; left:0; pointer-events:none; background:var(--ink-soft); color:white; padding:4px 8px; border-radius:4px; font-size:12px; font-weight:bold; z-index:100; font-family:monospace;">X: 0, Y: 0</div>
      <!-- SVGはJSが描画 -->
    </div>
    <div class="stage-controls">
      <button class="btn primary" id="btn-run" style="flex:1">実行 ▶</button>
      <button class="btn danger" id="btn-stop">停止</button>
      <button class="btn ghost" id="btn-reset">リセット</button>
    </div>

    <div class="emotion-palette">
      <h2 class="panel-title" style="margin-bottom:8px"><span class="dot" style="background:var(--accent-joy)"></span>感情パレット</h2>
      <div class="emotion-palette-grid" id="emotion-palette"></div>
    </div>
  </section>

  <!-- 中央パネル: コード入力 + コンソール -->
  <section class="panel code-panel">
    <h2 class="panel-title"><span class="dot"></span>プログラムコード記述領域</h2>
    <div class="code-area-wrap">
      <textarea id="code-input" spellcheck="false" placeholder="// ここに命令を書きます
R LUA -120
R LLA -10
EMOTION 喜び"></textarea>
    </div>
    <div class="code-toolbar">
      <button class="btn ghost" id="btn-sample-basic">基本サンプル</button>
      <button class="btn ghost" id="btn-sample-emotion">感情サンプル</button>
      <button class="btn ghost" id="btn-sample-graphics">図形サンプル</button>
      <button class="btn ghost" id="btn-sample-item">アイテム配置</button>
      <button class="btn ghost" id="btn-clear">クリア</button>
    </div>
    <h2 class="panel-title" style="margin-top:14px"><span class="dot"></span>コンソールパネル</h2>
    <div class="console-panel-inner" id="console-panel"></div>
  </section>

  <!-- 右パネル: 命令リファレンス -->
  <aside class="panel reference-panel">
    <h2 class="panel-title"><span class="dot"></span>入力可能命令一覧</h2>
    <div id="reference-content"></div>
  </aside>

</main>

<button id="btn-log-trigger" class="btn-log-trigger" title="プログラム実行ログを確認">📊 実行ログ確認</button>

<div id="log-modal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>📊 実行ログ・統計確認 <span style="font-size:12px; color:var(--ink-soft); font-weight:normal; margin-left:12px;">(Session: <span id="modal-session-id" style="font-family:monospace; font-weight:bold;"></span>)</span></h3>
      <button id="btn-modal-close" class="modal-close-btn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="stats-section">
        <h4>📈 統計要約</h4>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-label">描画された線</span>
            <span class="stat-value" id="stat-line-count">0 回</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">線の合計長さ</span>
            <span class="stat-value" id="stat-line-length">0 px</span>
          </div>
        </div>
        <h5 style="margin-top:14px; margin-bottom:8px; font-weight:600; color:var(--ink);">感情表現回数</h5>
        <div class="stats-emotions-grid" id="stats-emotions-list">
          <!-- 感情ごとの回数をJSで挿入 -->
        </div>
      </div>
      <div class="history-section">
        <h4>📋 詳細実行ログ履歴</h4>
        <div class="history-log-list" id="history-log-list">
          <!-- タイムスタンプ付き詳細ログ -->
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="btn-log-download" class="btn" style="background:#28a745; color:white; border-color:#28a745;">全体ログ(CSV)ダウンロード</button>
      <button id="btn-log-clear" class="btn danger">ログクリア</button>
      <button id="btn-modal-close-footer" class="btn ghost">閉じる</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
